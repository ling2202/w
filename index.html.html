/* ─── UTILITIES ─────────────────────────────────── */
function getWeekKey(dateStr) {
  // Week runs Sat–Fri. Key = "W-YYYY-MM-DD" of that Saturday.
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay(); // Sun=0, Mon=1 ... Sat=6
  const diffToSat = (day + 1) % 7; // Sat→0, Sun→1, Mon→2 ... Fri→6
  d.setDate(d.getDate() - diffToSat);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `W-${d.getFullYear()}-${mm}-${dd}`;
}

function weekLabel(wk) {
  // wk = "W-2026-05-02" → Sat date
  const sat = new Date(wk.slice(2) + "T00:00:00");
  const fri = new Date(sat); fri.setDate(sat.getDate() + 6);
  const f = d => `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  return `${f(sat)} – ${f(fri)}/${fri.getFullYear()}`;
}

function currentWeekKey() {
  return getWeekKey(new Date().toISOString().split('T')[0]);
}

function fmt(n) { return '$' + Number(n).toFixed(2); }

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { weekday:'short', day:'2-digit', month:'2-digit' });
}

/* ─── STATE ─────────────────────────────────────── */
const MEMBERS = {
  tri:  { name:'Tri',   family:1, tag:'TT', cls:'f1', dot:'#1a4fa8', venmo:'ling2202' },
  tram: { name:'Tram',  family:1, tag:'TT', cls:'f1', dot:'#4f7fd4', venmo:'' },
  long: { name:'Long',  family:2, tag:'LT', cls:'f2', dot:'#0d7a55', venmo:'se7enlk' },
  thao: { name:'Thao',  family:2, tag:'LT', cls:'f2', dot:'#3aab7e', venmo:'Thi-Lam-20' },
  methao: { name:'Me Thao', family:2, tag:'LT', cls:'f2', dot:'#2d6e4e', venmo:'' },
};
const CAT_ICON = {'Market':'🛒','Supermarket':'🏪','Food & Drink':'🍜','Utilities':'💡','Gas':'⛽','Other':'📦'};

let selectedSplit = new Set(['tri','tram','long','thao','methao']);
let currentFilter = 'all';
let viewWeek = currentWeekKey();
let allExpenses = {};   // { weekKey: { firebaseId: expenseObj } }
let weekKeys = [];

/* ─── FIREBASE LISTENERS ────────────────────────── */
/* ─── INLINE EDIT ───────────────────────────────── */
window.toggleDesc = function(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '▼' : '▲';
};

window.togglePayable = function(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '▼' : '▲';
};

window.togglePaidSection = function() {
  const body = document.getElementById('paid-status-body');
  const chev = document.getElementById('paid-chev');
  if (!body) return;
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '▼' : '▲';
};

window.savePaidStatus = async function() {
  const status = document.getElementById('paid-status-select').value;
  const date   = document.getElementById('paid-date-input').value;
  await set(ref(db, `paidStatus/${viewWeek}`), { status, date });
  // UI will update via onValue listener
};

let paidStatusUnsubscribe = null;

function loadPaidStatus(wk) {
  const section = document.getElementById('paid-status-section');
  if (!section) return;

  // check if there's actually a balance to settle
  const exps = allExpenses[wk] ? Object.values(allExpenses[wk]) : [];
  if (!exps.length) { section.style.display = 'none'; return; }
  const p2 = {}, o2 = {};
  Object.keys(MEMBERS).forEach(id => { p2[id]=0; o2[id]=0; });
  exps.forEach(e => {
    p2[e.payer] += e.amount;
    const share = e.amount / e.split.length;
    e.split.forEach(id => { o2[id] += share; });
  });
  const fn2 = {1:0, 2:0};
  Object.keys(MEMBERS).forEach(id => { fn2[MEMBERS[id].family] += p2[id] - o2[id]; });
  if (Math.abs(fn2[1] - fn2[2]) < 0.01) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  // unsubscribe previous listener before subscribing to new week
  if (paidStatusUnsubscribe) { paidStatusUnsubscribe(); paidStatusUnsubscribe = null; }

  // realtime listener on Firebase
  paidStatusUnsubscribe = onValue(ref(db, `paidStatus/${wk}`), snap => {
    const saved = snap.exists() ? snap.val() : {};
    const statusEl = document.getElementById('paid-status-select');
    const dateEl   = document.getElementById('paid-date-input');
    if (statusEl) statusEl.value = saved.status || 'unpaid';
    if (dateEl)   dateEl.value   = saved.date   || '';
    updatePaidUI(saved.status || 'unpaid', saved.date || '');
  });
}

function updatePaidUI(status, date) {
  const badge = document.getElementById('paid-status-badge');
  if (!badge) return;
  if (status === 'paid') {
    badge.textContent = date ? `✅ Paid ${date}` : '✅ Paid';
    badge.className = 'paid-badge paid';
  } else {
    badge.textContent = '⏳ Unpaid';
    badge.className = 'paid-badge unpaid';
  }
}

window.openInlineEdit = function(wk, fbId) {
  // close any other open edits first
  document.querySelectorAll('.exp-edit').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.exp-view').forEach(el => el.style.display = 'flex');
  document.getElementById('view-' + fbId).style.display = 'none';
  document.getElementById('edit-' + fbId).style.display = 'block';
};

window.closeInlineEdit = function(fbId) {
  document.getElementById('edit-' + fbId).style.display = 'none';
  document.getElementById('view-' + fbId).style.display = 'flex';
};

window.toggleIESplit = function(fbId, memberId, el) {
  const container = document.getElementById('ie-split-' + fbId);
  const active = container.querySelectorAll('.sp-btn[class*="on-"]');
  if (el.className.includes('on-') && active.length <= 1) return;
  if (el.className.includes('on-')) {
    el.className = 'sp-btn';
  } else {
    el.className = 'sp-btn on-' + MEMBERS[memberId].cls;
  }
};

window.saveInlineEdit = async function(wk, fbId) {
  const desc   = document.getElementById('ie-desc-'   + fbId).value.trim();
  const amount = parseFloat(document.getElementById('ie-amount-' + fbId).value);
  const date   = document.getElementById('ie-date-'   + fbId).value;
  const cat    = document.getElementById('ie-cat-'    + fbId).value;
  const payer  = document.getElementById('ie-payer-'  + fbId).value;
  const splitBtns = document.querySelectorAll(`#ie-split-${fbId} .sp-btn`);
  const split = [...splitBtns].filter(b => b.className.includes('on-')).map(b => b.dataset.id);
  if (!desc || !amount || amount <= 0 || !date || split.length === 0) {
    alert('Please fill in all fields!'); return;
  }
  const updated = { ...allExpenses[wk][fbId], desc, amount, date, cat, payer, split };
  const newWk = getWeekKey(date);
  if (newWk !== wk) {
    await remove(ref(db, `expenses/${wk}/${fbId}`));
    await push(ref(db, `expenses/${newWk}`), updated);
    viewWeek = newWk;
  } else {
    await set(ref(db, `expenses/${wk}/${fbId}`), updated);
  }
  // renderList will auto-trigger via onValue listener
};

function listenExpenses() {
  onValue(ref(db, 'expenses'), snap => {
    allExpenses = {};
    if (snap.exists()) {
      snap.forEach(weekSnap => {
        const wk = weekSnap.key;
        allExpenses[wk] = {};
        weekSnap.forEach(expSnap => {
          allExpenses[wk][expSnap.key] = expSnap.val();
        });
      });
    }
    weekKeys = Object.keys(allExpenses).sort().reverse();
    renderWeekSelector();
    renderAll();
  });
}

/* ─── SPLIT TOGGLES ─────────────────────────────── */
window.toggleSplit = function(id, el) {
  if (selectedSplit.has(id)) {
    if (selectedSplit.size <= 1) return;
    selectedSplit.delete(id); el.className = 'sp-btn';
  } else {
    selectedSplit.add(id); el.className = 'sp-btn on-' + MEMBERS[id].cls;
  }
};
window.selectFamily = function(n) {
  selectedSplit = new Set(Object.keys(MEMBERS).filter(id => MEMBERS[id].family === n));
  document.querySelectorAll('.sp-btn[data-id]').forEach(btn => {
    const id = btn.dataset.id;
    btn.className = selectedSplit.has(id) ? 'sp-btn on-' + MEMBERS[id].cls : 'sp-btn';
  });
};
window.selectAll = function() {
  selectedSplit = new Set(Object.keys(MEMBERS));
  document.querySelectorAll('.sp-btn[data-id]').forEach(btn => {
    btn.className = 'sp-btn on-' + MEMBERS[btn.dataset.id].cls;
  });
};

/* ─── ADD ───────────────────────────────────────── */
window.addExpense = async function() {
  const desc   = document.getElementById('inp-desc').value.trim();
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const payer  = document.getElementById('inp-payer').value;
  const cat    = document.getElementById('inp-cat').value;
  const date   = document.getElementById('inp-date').value;
  if (!desc || !amount || amount <= 0 || !payer || !date) {
    alert('Please fill in all fields!'); return;
  }
  const wk = getWeekKey(date);
  const expense = { desc, amount, payer, cat, date, split: [...selectedSplit], createdAt: Date.now() };
  await push(ref(db, `expenses/${wk}`), expense);
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-payer').value = '';
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  // switch view to that week
  viewWeek = wk;
  showMainTab('list');
};

/* ─── DELETE ────────────────────────────────────── */
window.deleteExpense = async function(wk, fbId) {
  if (!confirm('Delete this item?')) return;
  await remove(ref(db, `expenses/${wk}/${fbId}`));
};

/* ─── FILTER ────────────────────────────────────── */
window.setFilter = function(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
};

/* ─── WEEK SELECTOR ─────────────────────────────── */
window.switchWeek = function(wk) {
  viewWeek = wk;
  document.querySelectorAll('.week-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.wk === wk);
  });
  renderAll();
  loadPaidStatus(wk);
};

function renderWeekSelector() {
  const el = document.getElementById('week-selector');
  const thisWk = currentWeekKey();
  // always include current week
  const allWks = [...new Set([thisWk, ...weekKeys])].sort().reverse();
  el.innerHTML = allWks.map(wk => {
    const isCurrent = wk === thisWk;
    const exps = allExpenses[wk] ? Object.values(allExpenses[wk]) : [];
    const total = exps.reduce((s,e) => s+e.amount, 0);
    return `<button class="week-tab ${wk===viewWeek?'active':''} ${isCurrent?'current':''}"
      data-wk="${wk}" onclick="switchWeek('${wk}')">
      <span class="wt-label">${weekLabel(wk)}</span>
      ${isCurrent ? '<span class="wt-badge">This week</span>' : ''}
      ${total > 0 ? `<span class="wt-total">${fmt(total)}</span>` : ''}
    </button>`;
  }).join('');
}

/* ─── MAIN TABS ─────────────────────────────────── */
window.showMainTab = function(tab) {
  document.getElementById('tab-add').classList.toggle('active', tab==='add');
  document.getElementById('tab-list').classList.toggle('active', tab==='list');
  document.getElementById('tab-log').classList.toggle('active', tab==='log');
  document.getElementById('panel-add').style.display  = tab==='add'  ? 'block' : 'none';
  document.getElementById('panel-list').style.display = tab==='list' ? 'block' : 'none';
  document.getElementById('panel-log').style.display  = tab==='log'  ? 'block' : 'none';
  if (tab==='log') renderLog();
};

/* ─── RENDER ALL ────────────────────────────────── */
function renderAll() {
  renderList();
  renderSummary();
}

/* ─── RENDER LIST ───────────────────────────────── */
function renderList() {
  const el = document.getElementById('expense-list');
  const raw = allExpenses[viewWeek] ? Object.entries(allExpenses[viewWeek]) : [];
  let list = raw.map(([fbId, e]) => ({fbId, ...e}));

  if (currentFilter !== 'all') {
    const fnum = currentFilter === 'f1' ? 1 : 2;
    list = list.filter(e => MEMBERS[e.payer].family===fnum || e.split.some(id => MEMBERS[id].family===fnum));
  }

  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="big">🧾</div><div>No expenses this week yet.</div></div>';
    return;
  }

  list.sort((a,b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
  const groups = {};
  list.forEach(e => { if (!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });

  el.innerHTML = Object.entries(groups).map(([date, items]) => {
    const dayTotal = items.reduce((s,e)=>s+e.amount,0);
    return `<div class="day-group">
      <div class="day-header">
        <span>${fmtDate(date)}</span>
        <span>${fmt(dayTotal)}</span>
      </div>
      ${items.map(e => {
        const payer = MEMBERS[e.payer];
        const share = e.amount / e.split.length;
        const chips = e.split.map(id=>`<span class="chip chip-${MEMBERS[id].cls}">${MEMBERS[id].name}</span>`).join('');
        const splitIds = e.split.join(',');
        return `<div class="exp-item" id="item-${e.fbId}">
          <!-- VIEW MODE -->
          <div class="exp-view" id="view-${e.fbId}">
            <div class="exp-cat-icon">${CAT_ICON[e.cat]||'📦'}</div>
            <div class="exp-body">
              <div class="exp-title-row">
                <span class="exp-cat-label">${e.cat}</span>
                ${e.desc ? `<button class="desc-toggle" onclick="toggleDesc('desc-${e.fbId}',this)">▼</button>` : ''}
              </div>
              <div class="exp-desc-drop" id="desc-${e.fbId}" style="display:none;">${e.desc.replace(/\n/g,'<br>')}</div>
              <div class="exp-meta">Paid by <strong class="name-${payer.cls}">${payer.name}</strong></div>
              <div class="exp-chips">${chips}</div>
            </div>
            <div class="exp-right">
              <div class="exp-amount">${fmt(e.amount)}</div>
              <div class="exp-share">/ ${fmt(share)} each</div>
            </div>
            <div class="action-btns">
              <button class="edit-btn" onclick="openInlineEdit('${viewWeek}','${e.fbId}')" title="Edit">✏️</button>
              <button class="del-btn" onclick="deleteExpense('${viewWeek}','${e.fbId}')" title="Delete">🗑️</button>
            </div>
          </div>
          <!-- EDIT MODE (hidden by default) -->
          <div class="exp-edit" id="edit-${e.fbId}" style="display:none;">
            <div class="inline-edit-grid">
              <div class="ie-field"><label class="form-label">Description</label><textarea class="form-input ie-input" id="ie-desc-${e.fbId}" rows="2">${e.desc}</textarea></div>
              <div class="ie-field"><label class="form-label">Amount ($)</label><input type="number" class="form-input ie-input" id="ie-amount-${e.fbId}" value="${e.amount}" min="0" step="0.01"/></div>
              <div class="ie-field"><label class="form-label">Date</label><input type="date" class="form-input ie-input" id="ie-date-${e.fbId}" value="${e.date}"/></div>
              <div class="ie-field"><label class="form-label">Category</label>
                <select class="form-select ie-input" id="ie-cat-${e.fbId}">
                  <option value="Market" ${e.cat==='Market'?'selected':''}>🛒 Market</option>
                  <option value="Supermarket" ${e.cat==='Supermarket'?'selected':''}>🏪 Supermarket</option>
                  <option value="Food &amp; Drink" ${e.cat==='Food & Drink'?'selected':''}>🍜 Food &amp; Drink</option>
                  <option value="Utilities" ${e.cat==='Utilities'?'selected':''}>💡 Utilities</option>
                  <option value="Gas" ${e.cat==='Gas'?'selected':''}>⛽ Gas</option>
                  <option value="Other" ${e.cat==='Other'?'selected':''}>📦 Other</option>
                </select>
              </div>
              <div class="ie-field"><label class="form-label">Paid by</label>
                <select class="form-select ie-input" id="ie-payer-${e.fbId}">
                  <option value="tri" ${e.payer==='tri'?'selected':''}>Tri (TT)</option>
                  <option value="tram" ${e.payer==='tram'?'selected':''}>Tram (TT)</option>
                  <option value="long" ${e.payer==='long'?'selected':''}>Long (LT)</option>
                  <option value="thao" ${e.payer==='thao'?'selected':''}>Thao (LT)</option>
                  <option value="methao" ${e.payer==='methao'?'selected':''}>Me Thao (LT)</option>
                </select>
              </div>
              <div class="ie-field ie-split">
                <label class="form-label">Split with</label>
                <div class="split-btns" id="ie-split-${e.fbId}">
                  ${['tri','tram','long','thao','methao'].map(id => {
                    const m = MEMBERS[id];
                    const on = e.split.includes(id);
                    return `<button class="sp-btn ${on?'on-'+m.cls:''}" data-id="${id}" onclick="toggleIESplit('${e.fbId}','${id}',this)">${m.name}</button>`;
                  }).join('')}
                </div>
              </div>
            </div>
            <div class="ie-actions">
              <button class="ie-cancel" onclick="closeInlineEdit('${e.fbId}')">Cancel</button>
              <button class="ie-save" onclick="saveInlineEdit('${viewWeek}','${e.fbId}')">Update</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

/* ─── RENDER SUMMARY ────────────────────────────── */
function renderSummary() {
  const exps = allExpenses[viewWeek] ? Object.values(allExpenses[viewWeek]) : [];
  const paid={}, owed={};
  Object.keys(MEMBERS).forEach(id=>{paid[id]=0;owed[id]=0;});
  exps.forEach(e => {
    paid[e.payer] += e.amount;
    const share = e.amount / e.split.length;
    e.split.forEach(id => { owed[id] += share; });
  });

  document.getElementById('sum-cards').innerHTML = Object.entries(MEMBERS).map(([id,m])=>{
    const balance = paid[id]-owed[id];
    const balColor = balance > 0.005 ? '#0d7a55' : balance < -0.005 ? '#c94040' : 'var(--muted)';
    return `<div class="sum-card">
      <div class="sc-name"><span class="dot" style="background:${m.dot}"></span>${m.name}<span class="sc-fam">${m.tag}</span></div>
      <div class="sc-owed">${fmt(owed[id])}</div>
      <div class="sc-paid">Paid: ${fmt(paid[id])}</div>
      <div class="sc-bal" style="color:${balColor}">${balance>=0?'+':''}${fmt(balance)}</div>
    </div>`;
  }).join('');

  const total = exps.reduce((s,e)=>s+e.amount,0);
  document.getElementById('grand-total').textContent = fmt(total);
  document.getElementById('week-title-sum').textContent = weekLabel(viewWeek);

  // settle — grouped by family
  const famNet = {1: 0, 2: 0};
  Object.keys(MEMBERS).forEach(id => { famNet[MEMBERS[id].family] += paid[id] - owed[id]; });
  const settleEl   = document.getElementById('settle-list');
  const payableEl  = document.getElementById('payable-list');
  const payableSec = document.getElementById('payable-section');
  const diff = famNet[1] - famNet[2];
  if (Math.abs(diff) < 0.01) {
    settleEl.innerHTML = '<div class="settled-msg">✓ All settled this week!</div>';
    if (payableSec) payableSec.style.display = 'none';
  } else {
    const fromCls  = diff < 0 ? 'f1' : 'f2';
    const toCls    = diff < 0 ? 'f2' : 'f1';
    const fromLbl  = diff < 0 ? 'TT' : 'LT';
    const toLbl    = diff < 0 ? 'LT' : 'TT';
    const totalAmt = Math.abs(diff) / 2;
    settleEl.innerHTML = `<div class="settle-row">
      <span><strong class="name-${fromCls}">${fromLbl}</strong><span class="arrow">→</span><strong class="name-${toCls}">${toLbl}</strong></span>
      <span class="settle-amt">${fmt(totalAmt)}</span>
    </div>`;
    // Payable
    if (payableSec) payableSec.style.display = 'block';
    if (payableEl) {
      const rcvFamily = diff < 0 ? 2 : 1;
      const receivers = Object.entries(MEMBERS).filter(([,m]) => m.family === rcvFamily);
      payableEl.innerHTML = receivers.map(([id, m]) => {
        const venmoUrl = m.venmo
          ? `https://venmo.com/u/${m.venmo}?txn=pay&amount=${totalAmt.toFixed(2)}&note=House%20Expenses`
          : '';
        const btnId = 'payable-' + id;
        return `<div class="payable-row">
          <div class="payable-header" onclick="togglePayable('${btnId}')">
            <div class="payable-left">
              <span class="payable-to-label">Pay to</span>
              <strong class="name-${m.cls}">${m.name}</strong>
            </div>
            <div class="payable-right">
              <span class="payable-amt">${fmt(totalAmt)}</span>
              <span class="payable-chevron" id="chev-${btnId}">▼</span>
            </div>
          </div>
          <div class="payable-body" id="${btnId}" style="display:none;">
            ${venmoUrl
              ? `<a class="venmo-btn" href="${venmoUrl}" target="_blank">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M19.3 1c.8 1.3 1.2 2.7 1.2 4.6 0 5.7-4.9 13.1-8.9 18.4H4.4L1 2.3l7.3-.7 1.8 14.4C12.1 12.5 14.5 7 14.5 3.4c0-1.9-.3-3.2-.8-4.3L19.3 1z"/></svg>
                  Pay ${m.name} on Venmo
                </a>`
              : `<span class="venmo-empty">Add venmo username in code</span>`
            }
          </div>
        </div>`;
      }).join('');
    }
  }
  loadPaidStatus(viewWeek);
}

/* ─── RENDER LOG ────────────────────────────────── */
function renderLog() {
  const el = document.getElementById('log-content');
  const thisWk = currentWeekKey();
  const pastWks = Object.keys(allExpenses).filter(wk => wk !== thisWk).sort().reverse();
  if (!pastWks.length) {
    el.innerHTML = '<div class="empty-state"><div class="big">📅</div><div>No past weeks yet.</div></div>';
    return;
  }
  el.innerHTML = pastWks.map(wk => {
    const exps = Object.values(allExpenses[wk]);
    const paid={},owed={};
    Object.keys(MEMBERS).forEach(id=>{paid[id]=0;owed[id]=0;});
    exps.forEach(e=>{
      paid[e.payer]+=e.amount;
      const share=e.amount/e.split.length;
      e.split.forEach(id=>{owed[id]+=share;});
    });
    const total=exps.reduce((s,e)=>s+e.amount,0);
    const net={};
    const famNet2={1:0,2:0};
    Object.keys(MEMBERS).forEach(id=>{famNet2[MEMBERS[id].family]+=paid[id]-owed[id];});
    const logDiff=famNet2[1]-famNet2[2];
    const logSettle=Math.abs(logDiff)>=0.01
      ? `<span class="settle-pill"><strong class="name-${logDiff<0?'f1':'f2'}">${logDiff<0?'TT':'LT'}</strong> → <strong class="name-${logDiff<0?'f2':'f1'}">${logDiff<0?'LT':'TT'}</strong>: ${fmt(Math.abs(logDiff)/2)}</span>`
      : '<span class="settled-pill">✓ Settled</span>';

    const expRows = [...exps].sort((a,b)=>b.date.localeCompare(a.date)||b.createdAt-a.createdAt).map(e=>{
      const payer=MEMBERS[e.payer];
      const chips=e.split.map(id=>`<span class="chip chip-${MEMBERS[id].cls}">${MEMBERS[id].name}</span>`).join('');
      return `<div class="log-exp-row">
        <span class="log-cat">${CAT_ICON[e.cat]||'📦'}</span>
        <span class="log-desc">${e.desc}</span>
        <span class="log-meta">${fmtDate(e.date)} · <span class="name-${payer.cls}">${payer.name}</span></span>
        <span class="log-chips">${chips}</span>
        <span class="log-amt">${fmt(e.amount)}</span>
      </div>`;
    }).join('');

    // analysis by category
    const catTotals = {};
    exps.forEach(e => { catTotals[e.cat] = (catTotals[e.cat]||0) + e.amount; });
    const catRows = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>
      `<span class="sum-pill">${CAT_ICON[cat]||'📦'} ${cat} <strong>${fmt(amt)}</strong></span>`
    ).join('');

    // analysis by payer
    const payerTotals = {};
    exps.forEach(e => { payerTotals[e.payer] = (payerTotals[e.payer]||0) + e.amount; });
    const payerRows = Object.entries(payerTotals).sort((a,b)=>b[1]-a[1]).map(([id,amt])=>
      `<span class="sum-pill name-${MEMBERS[id].cls}">${MEMBERS[id].name} <strong>${fmt(amt)}</strong></span>`
    ).join('');

    return `<div class="log-week" id="log-${wk}">
      <div class="log-week-header" onclick="toggleLogWeek('${wk}')">
        <div>
          <div class="log-week-title">${weekLabel(wk)}</div>
          <div class="log-week-sub">${exps.length} items · ${fmt(total)}</div>
        </div>
        <span class="log-toggle" id="tog-${wk}">▼</span>
      </div>
      <div class="log-week-body" id="body-${wk}" style="display:none;">
        <div class="log-settle">${logSettle}</div>
        <div class="log-analysis">
          <div class="analysis-label">By category</div>
          <div class="sum-pills">${catRows}</div>
          <div class="analysis-label" style="margin-top:8px;">By person</div>
          <div class="sum-pills">${payerRows}</div>
        </div>
        <div class="log-exps">${expRows}</div>
      </div>
    </div>`;
  }).join('');
}

window.toggleLogWeek = function(wk) {
  const body = document.getElementById('body-'+wk);
  const tog  = document.getElementById('tog-'+wk);
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  tog.textContent = open ? '▼' : '▲';
};

document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
listenExpenses();
showMainTab('list');

        <div id="paid-status-section" style="display:none;">
          <div class="divider" style="margin:.75rem 0;"></div>
          <div class="paid-status-header" onclick="togglePaidSection()">
            <span class="settle-head" style="margin:0;">Paid status</span>
            <span id="paid-status-badge" class="paid-badge unpaid">⏳ Unpaid</span>
            <span id="paid-chev" style="font-size:11px;color:var(--muted);margin-left:auto;">▼</span>
          </div>
          <div id="paid-status-body" style="display:none;margin-top:10px;">
            <div class="paid-row">
              <div class="paid-field">
                <label class="form-label">Status</label>
                <select class="form-select" id="paid-status-select" onchange="savePaidStatus()">
                  <option value="unpaid">⏳ Unpaid</option>
                  <option value="paid">✅ Paid</option>
                </select>
              </div>
              <div class="paid-field">
                <label class="form-label">Paid date</label>
                <input type="date" class="form-input" id="paid-date-input" onchange="savePaidStatus()" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-col">

    <!-- Add panel -->
    <div class="panel" id="panel-add" style="display:none;">
      <div class="panel-head"><h2>Add Expense</h2><span style="font-size:11px;color:var(--muted);">USD $</span></div>
      <div class="panel-body">
        <div class="fam-row">
          <div class="fam-card f1">
            <div class="fav-stack"><div class="fav f1a">T</div><div class="fav f1b">T</div></div>
            <div class="fam-info"><div class="fn f1">TT</div><div class="fm">Tri · Tram</div></div>
          </div>
          <div class="fam-card f2">
            <div class="fav-stack"><div class="fav f2a">L</div><div class="fav f2b">T</div><div class="fav f2b" style="margin-left:-5px;background:#2d6e4e;">M</div></div>
            <div class="fam-info"><div class="fn f2">LT</div><div class="fm">Long · Thao · Me Thao</div></div>
          </div>
        </div>
        <div class="form-row">
          <div><label class="form-label">Description</label><input type="text" class="form-input" id="inp-desc" placeholder="Groceries, utilities..."/></div>
          <div><label class="form-label">Amount ($)</label><input type="number" class="form-input" id="inp-amount" placeholder="0.00" min="0" step="0.01"/></div>
        </div>
        <div class="form-row">
          <div><label class="form-label">Date</label><input type="date" class="form-input" id="inp-date"/></div>
          <div><label class="form-label">Category</label>
            <select class="form-select" id="inp-cat">
              <option value="Market">🛒 Market</option>
              <option value="Supermarket">🏪 Supermarket</option>
              <option value="Food & Drink">🍜 Food & Drink</option>
              <option value="Utilities">💡 Utilities</option>
              <option value="Gas">⛽ Gas</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Paid by</label>
          <select class="form-select" id="inp-payer">
            <option value="">-- Who paid? --</option>
            <option value="tri">Tri (TT)</option>
            <option value="tram">Tram (TT)</option>
            <option value="long">Long (LT)</option>
            <option value="thao">Thao (LT)</option>
            <option value="methao">Me Thao (LT)</option>
          </select>
        </div>
        <label class="split-label">Split with?</label>
        <div class="split-btns">
          <button class="sp-btn on-f1" data-id="tri"  onclick="toggleSplit('tri',this)">Tri</button>
          <button class="sp-btn on-f1" data-id="tram" onclick="toggleSplit('tram',this)">Tram</button>
          <button class="sp-btn on-f2" data-id="long" onclick="toggleSplit('long',this)">Long</button>
          <button class="sp-btn on-f2" data-id="thao" onclick="toggleSplit('thao',this)">Thao</button>
          <button class="sp-btn on-f2" data-id="methao" onclick="toggleSplit('methao',this)">Me Thao</button>
        </div>
        <div class="quick-split">
          <button class="qs-btn" onclick="selectFamily(1)">Only TT</button>
          <button class="qs-btn" onclick="selectFamily(2)">Only LT</button>
          <button class="qs-btn" onclick="selectAll()">Everyone</button>
        </div>
        <button class="submit-btn" onclick="addExpense()">Add Expense</button>
      </div>
    </div>

    <!-- List panel -->
    <div class="panel" id="panel-list">
      <div class="panel-head">
        <h2>This Week's Expenses</h2>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all',this)">Everyone</button>
          <button class="filter-btn" onclick="setFilter('f1',this)">TT</button>
          <button class="filter-btn" onclick="setFilter('f2',this)">LT</button>
        </div>
      </div>
      <div class="panel-body" id="expense-list">
        <div class="empty-state"><div class="big">⏳</div><div>Connecting to Firebase...</div></div>
      </div>
    </div>

    <!-- Log panel -->
    <div class="panel" id="panel-log" style="display:none;">
      <div class="panel-head"><h2>📅 Weekly History</h2></div>
      <div class="panel-body" id="log-content">
        <div class="empty-state"><div class="big">📅</div><div>No history yet.</div></div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
